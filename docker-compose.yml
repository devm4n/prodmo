services:
  backend:
    depends_on:
      db:
        condition: service_healthy
        restart: true
    build: ./backend
    env_file:
      - .env
    container_name: prodman_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
  db:
    image: postgres:16
    container_name: prodman_db
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    container_name: prodman_frontend
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
volumes:
  postgres:
